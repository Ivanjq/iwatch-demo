name: Build WatchOS Demo

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: pull code
        uses: actions/checkout@v3

      - name: select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: iWatch-demo
        run: |
          xcodebuild \
          -scheme iwatch-demo \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          build