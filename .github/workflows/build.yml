name: Build WatchOS Demo

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: List files
        run: ls -la

      - name: List schemes
        run: xcodebuild -list

      - name: Build
        run: |
          xcodebuild \
          -scheme iwatch-demo \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          CODE_SIGNING_ALLOWED=NO \
          build